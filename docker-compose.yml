services:
  postgres:
    image: postgres:16-alpine
    container_name: cinereviews-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cinereviews
      POSTGRES_PASSWORD: cinereviews
      POSTGRES_DB: cinereviews
    ports:
      - '5433:5432'
    volumes:
      # Not: sinefiles → cinereviews geçişinde POSTGRES_USER/DB yalnızca ilk
      # başlatmada uygulandığından eski "postgres_data" volume'ü yeni kimlik
      # bilgileriyle uyumsuz kaldı; taze init için volume adı değiştirildi.
      # Eski veriyi temizlemek için: docker volume rm movie-tv-review_postgres_data
      - postgres_data_cinereviews:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U cinereviews -d cinereviews']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cinereviews-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_cinereviews:
  redis_data:
